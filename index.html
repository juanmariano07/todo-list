<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow – Lista de Tarefas</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: #e5e4e0;
      --accent: #7c3aed;       /* roxo vibrante */
      --accent-light: #ede9fe;
      --done-color: #16a34a;
      --danger: #dc2626;
      --text: #1c1917;
      --muted: #78716c;
      --font: 'Bricolage Grotesque', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --radius: 14px;
      --shadow: 0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      padding: 40px 24px 80px;
    }

    /* ============================================
       LAYOUT
       ============================================ */
    .container {
      max-width: 580px;
      margin: 0 auto;
    }

    /* ============================================
       HEADER
       ============================================ */
    .app-header { margin-bottom: 36px; }
    .app-header__top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    h1 {
      font-family: var(--font);
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .stats {
      text-align: right;
      font-size: .8rem;
      color: var(--muted);
      line-height: 1.5;
    }
    .stats strong { color: var(--accent); font-weight: 700; }

    /* Barra de progresso */
    .progress-bar {
      height: 6px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 16px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      transition: width .4s ease;
    }

    /* ============================================
       FILTROS
       ============================================ */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .filter-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      font-family: var(--font-body);
      font-size: .82rem;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .filter-btn:not(.active):hover { border-color: var(--accent); color: var(--accent); }

    /* ============================================
       CAMPO DE NOVA TAREFA
       ============================================ */
    .add-form {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    .add-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      font-family: var(--font-body);
      font-size: .95rem;
      color: var(--text);
      outline: none;
      box-shadow: var(--shadow);
      transition: border-color .2s;
    }
    .add-input:focus { border-color: var(--accent); }
    .add-input::placeholder { color: #c4c0bb; }

    .add-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 14px 20px;
      font-family: var(--font);
      font-weight: 700;
      font-size: 1.3rem;
      cursor: pointer;
      box-shadow: 0 2px 12px rgba(124,58,237,.3);
      transition: opacity .2s, transform .15s;
    }
    .add-btn:hover { opacity: .85; }
    .add-btn:active { transform: scale(.95); }

    /* ============================================
       LISTA DE TAREFAS
       ============================================ */
    .tasks-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* Mensagem quando não há tarefas */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: .9rem; }

    /* Item da tarefa */
    .task-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: var(--shadow);
      animation: slideIn .25s ease both;
      transition: opacity .2s, transform .2s;
    }
    .task-item.removing { opacity: 0; transform: translateX(30px); }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Checkbox customizado */
    .task-check {
      width: 22px; height: 22px;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: background .2s, border-color .2s;
    }
    .task-check:hover { border-color: var(--accent); }
    .task-check.checked {
      background: var(--done-color);
      border-color: var(--done-color);
    }
    .task-check.checked::after { content: '✓'; color: #fff; font-size: .8rem; font-weight: 700; }

    /* Texto da tarefa */
    .task-text {
      flex: 1;
      font-size: .95rem;
      line-height: 1.4;
      word-break: break-word;
      transition: color .2s;
    }
    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* Botão de deletar */
    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color .2s, background .2s;
      flex-shrink: 0;
      opacity: 0;
    }
    .task-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--danger); background: #fef2f2; }

    /* ============================================
       RODAPÉ — limpar concluídas
       ============================================ */
    .footer {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }
    .clear-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: .82rem;
      cursor: pointer;
      text-decoration: underline;
      transition: color .2s;
    }
    .clear-btn:hover { color: var(--danger); }
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="app-header">
    <div class="app-header__top">
      <h1>Minhas<br/>Tarefas</h1>
      <div class="stats">
        <div><strong id="doneCount">0</strong> concluídas</div>
        <div><strong id="totalCount">0</strong> no total</div>
      </div>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
  </div>

  <!-- FILTROS -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all">Todas</button>
    <button class="filter-btn" data-filter="pending">Pendentes</button>
    <button class="filter-btn" data-filter="done">Concluídas</button>
  </div>

  <!-- FORMULÁRIO DE NOVA TAREFA -->
  <div class="add-form">
    <input
      class="add-input"
      type="text"
      id="taskInput"
      placeholder="Adicionar nova tarefa..."
      maxlength="120"
    />
    <button class="add-btn" id="addBtn" aria-label="Adicionar tarefa">+</button>
  </div>

  <!-- LISTA -->
  <div class="tasks-list" id="tasksList"></div>

  <!-- RODAPÉ -->
  <div class="footer">
    <button class="clear-btn" id="clearDoneBtn">Limpar concluídas</button>
  </div>

</div>

<script>
  // ================================================
  // ESTADO — toda aplicação vive nesse array
  // Cada tarefa é um objeto: { id, text, done }
  // ================================================
  let tasks = [];
  let filter = 'all'; // 'all' | 'pending' | 'done'

  // ================================================
  // LOCALSTORAGE — persiste os dados no navegador
  // Os dados ficam salvos mesmo ao fechar a aba
  // ================================================
  function save() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function load() {
    const saved = localStorage.getItem('tasks');
    // Se não há nada salvo, começa com tarefas de exemplo
    tasks = saved ? JSON.parse(saved) : [
      { id: 1, text: 'Estudar JavaScript por 1 hora', done: true },
      { id: 2, text: 'Fazer um projeto para o portfólio', done: false },
      { id: 3, text: 'Criar conta no GitHub', done: false },
    ];
  }

  // ================================================
  // ADICIONAR TAREFA
  // ================================================
  const taskInput = document.getElementById('taskInput');
  const addBtn    = document.getElementById('addBtn');

  addBtn.addEventListener('click', addTask);
  taskInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') addTask();
  });

  function addTask() {
    const text = taskInput.value.trim(); // remove espaços extras
    if (!text) return;                    // ignora se estiver vazio

    // Cria um novo objeto de tarefa
    const newTask = {
      id: Date.now(),   // ID único baseado no timestamp
      text,
      done: false,
    };

    tasks.unshift(newTask); // adiciona no início da lista
    save();
    taskInput.value = '';
    render();
  }

  // ================================================
  // ALTERNAR STATUS (concluída / pendente)
  // ================================================
  function toggleTask(id) {
    // Encontra a tarefa pelo id e inverte o valor de 'done'
    const task = tasks.find(t => t.id === id);
    if (task) {
      task.done = !task.done;
      save();
      render();
    }
  }

  // ================================================
  // DELETAR TAREFA (com animação)
  // ================================================
  function deleteTask(id) {
    // Encontra o elemento no DOM e adiciona classe de animação
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) {
      el.classList.add('removing');
      // Espera a animação terminar antes de remover do array
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id); // cria novo array sem a tarefa
        save();
        render();
      }, 200);
    }
  }

  // ================================================
  // LIMPAR CONCLUÍDAS
  // ================================================
  document.getElementById('clearDoneBtn').addEventListener('click', () => {
    tasks = tasks.filter(t => !t.done); // mantém só as pendentes
    save();
    render();
  });

  // ================================================
  // FILTROS
  // ================================================
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filter = btn.dataset.filter;
      render();
    });
  });

  // ================================================
  // RENDERIZAR — atualiza o HTML com base no estado
  // Esse padrão (estado → render) é a base do React!
  // ================================================
  function render() {
    const list = document.getElementById('tasksList');

    // Filtra as tarefas conforme o filtro ativo
    const filtered = tasks.filter(t => {
      if (filter === 'pending') return !t.done;
      if (filter === 'done')    return t.done;
      return true; // 'all'
    });

    // Estado vazio
    if (!filtered.length) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="icon">📋</div>
          <p>Nenhuma tarefa aqui ainda.</p>
        </div>`;
    } else {
      // Gera o HTML de cada tarefa usando map + join
      list.innerHTML = filtered.map(task => `
        <div class="task-item ${task.done ? 'done' : ''}" data-id="${task.id}">
          <div class="task-check ${task.done ? 'checked' : ''}"
               onclick="toggleTask(${task.id})"
               role="checkbox"
               aria-checked="${task.done}"
               tabindex="0"></div>
          <span class="task-text">${escapeHtml(task.text)}</span>
          <button class="delete-btn" onclick="deleteTask(${task.id})" aria-label="Deletar tarefa">✕</button>
        </div>
      `).join('');
    }

    // Atualiza estatísticas e barra de progresso
    const done  = tasks.filter(t => t.done).length;
    const total = tasks.length;
    const pct   = total > 0 ? Math.round((done / total) * 100) : 0;

    document.getElementById('doneCount').textContent  = done;
    document.getElementById('totalCount').textContent = total;
    document.getElementById('progressFill').style.width = pct + '%';
  }

  // ================================================
  // SEGURANÇA: escapa HTML para evitar XSS
  // Nunca insira texto de usuário diretamente no DOM!
  // ================================================
  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ================================================
  // INIT
  // ================================================
  load();
  render();
</script>
</body>
</html>
